<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>PX-SO v0.3.7</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <h1>PX-SO v0.3.7</h1>
      <p>Thêm bước gộp cuối cho Số tách/Số không tách sau khi xử lý.</p>
    </header>

    <section class="panel">
      <h2>Vùng nhập dữ liệu</h2>
      <textarea id="inputData" placeholder="Dán tin gốc vào đây..."></textarea>
      <div class="buttons">
        <button onclick="runAll()">CHẠY</button>
        <button onclick="clearRun()" class="gray">XÓA KẾT QUẢ</button>
      </div>
    </section>

    <section class="panel">
      <h2>Copy nhanh</h2>
      <textarea id="copyFast" readonly placeholder="Tin sau khi tự xuống dòng tối đa 24 ký tự..."></textarea>
      <button onclick="copyText('copyFast')">Copy nhanh</button>
    </section>

    <section class="panel">
      <h2>Số trúng</h2>
      <textarea id="soTrung" readonly></textarea>
    </section>

    <section class="panel result-row compact-result">
      <div>
        <h2>Ghi:</h2>
        <textarea id="ghi" readonly></textarea>
        <button onclick="copyText('ghi')">Copy ghi</button>
      </div>
      <div>
        <h2>Thưởng:</h2>
        <textarea id="thuong" readonly>0</textarea>
        <button onclick="copyText('thuong')">Copy thưởng</button>
      </div>
    </section>

    <section class="panel">
      <h2>Hệ số / cài đặt</h2>
      <div class="grid settings">
        <label>Nhân <input id="rate" value="0.8"></label>
        <label>Đá 2 đài <input id="coefDa2" value="550"></label>
        <label>Đá 1 đài <input id="coefDa1" value="750"></label>
        <label>Đá Hà Nội <input id="coefDaHN" value="650"></label>
        <label>2 số <input id="coef2" value="75"></label>
        <label>3 số <input id="coef3" value="650"></label>
        <label>4 số <input id="coef4" value="5500"></label>
        <label>Max 2 số <input id="max2" value="10"></label>
        <label>Max đá <input id="maxDa" value="1"></label>
      </div>
    </section>

    <section class="panel">
      <h2>Số tách</h2>
      <textarea id="soTach" readonly></textarea>
      <button onclick="copyText('soTach')">Copy số tách</button>
    </section>

    <section class="panel">
      <h2>Số không tách</h2>
      <textarea id="soKhongTach" readonly></textarea>
      <button onclick="copyText('soKhongTach')">Copy không tách</button>
    </section>

    <section class="panel">
      <h2>Dãy xoá</h2>
      <div class="grid3">
        <label>Dãy xoá MN<textarea id="xoaMn"></textarea></label>
        <label>Dãy xoá MT<textarea id="xoaMt"></textarea></label>
        <label>Dãy xoá HN<textarea id="xoaHn"></textarea></label>
      </div>
    </section>

    <section class="panel">
      <h2>Vùng dán kết quả</h2>
      <div class="grid3">
        <label>Kết quả MN<textarea id="kqMn" placeholder="Dán nguyên bảng kết quả MN từ Minh Ngọc..."></textarea></label>
        <label>Kết quả MT<textarea id="kqMt" placeholder="Dán nguyên bảng kết quả MT..."></textarea></label>
        <label>Kết quả HN<textarea id="kqHn" placeholder="Dán nguyên bảng kết quả HN..."></textarea></label>
      </div>
      <div class="buttons">
        <button onclick="parseResultsOnly()">Chuẩn hoá kết quả</button>
      </div>
    </section>

    <section class="panel">
      <h2>Kết quả đã hiểu</h2>
      <textarea id="parsedResults" readonly></textarea>
    </section>

    <section class="panel">
      <h2>Dữ liệu trung gian đã bung</h2>
      <textarea id="detail" readonly></textarea>
    </section>

    <footer>PX-SO v0.3.7 — copy nhanh ngắt dòng tối đa 24 ký tự</footer>
  </div>
<script src="app.js"></script>
</body>
</html>
