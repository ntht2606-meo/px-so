<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Mô phỏng vùng đã tách — Atomic Reset</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="wrap">
    <h1>Mô phỏng vùng đã tách</h1>
    <p class="note">
      Dữ liệu mẫu trung tính. Dòng có 2 mục là một atomic; dòng có 3 mục sẽ bung thành 3 cặp.
      Ví dụ <code>A.B.C#1</code> → <code>A.B#1</code>, <code>A.C#1</code>, <code>B.C#1</code>.
    </p>

    <section class="panel">
      <div class="row">
        <label for="maxValue">Mức tối đa</label>
        <input id="maxValue" type="number" min="1" value="1">
      </div>

      <label for="inputData">Đầu vào hiện tại</label>
      <textarea id="inputData" spellcheck="false" placeholder="NHOM_A&#10;A.B#1"></textarea>

      <div class="buttons">
        <button id="sample1Btn" class="secondary">Nạp mẫu 1</button>
        <button id="sample2Btn" class="secondary">Nạp mẫu 2</button>
        <button id="splitBtn" class="primary">Tách</button>
      </div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>Đã tách</h2>
        <textarea id="splitOutput" readonly></textarea>
        <div class="buttons">
          <button id="copyBtn">Sao chép</button>
          <button id="clearBtn" class="danger">Xóa</button>
        </div>
      </div>

      <div class="panel">
        <h2>Giữ nguyên của lần xử lý hiện tại</h2>
        <textarea id="keptOutput" readonly></textarea>
      </div>
    </section>

    <section class="panel">
      <h2>Trạng thái</h2>
      <pre id="status"></pre>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
